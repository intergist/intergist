# Vault Kin Mobile Build Pipeline
#
# Builds the Vault Kin PWA as an Android app using Capacitor.
#
# Triggers:
#   - Push to main (vault-kin/app changes) → Debug APK artifact
#   - Push of v* tag → Signed APK + AAB → GitHub Release + Play Store
#   - Manual workflow_dispatch → Signed APK + AAB → GitHub Release
#
# Prerequisites:
#   - Android SDK (set up by android-actions/setup-android)
#   - android/ directory must exist (generated by `npx cap add android`)
#   - Secrets: ANDROID_KEYSTORE_B64, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD, GP_SERVICE_ACCOUNT
#   - Variables: VITE_API_URL

name: "Vault Kin: Mobile Build Pipeline"

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
    paths:
      - 'vault-kin/app/**'
      - '.github/workflows/mobile-build.yml'
  workflow_dispatch:
    inputs:
      release_track:
        description: 'Play Store track'
        default: 'internal'
        type: choice
        options: [internal, alpha, beta, production]

env:
  APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || '0.0.0-dev' }}
  BUILD_NUMBER: ${{ github.run_number }}
  BUNDLE_ID: com.intergist.vaultkin
  WORKING_DIR: vault-kin/app

jobs:
  build-web:
    name: Build Web Assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vault-kin/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vault-kin/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build:web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: vault-kin/app/dist/public/
          retention-days: 1

  build-android:
    name: Build Android
    needs: build-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vault-kin/app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vault-kin/app/package-lock.json

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: vault-kin/app/dist/public/

      - name: Capacitor sync
        run: npx cap sync android

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/keystore.jks

      - name: Build debug APK (branch push)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        run: cd android && ./gradlew assembleDebug

      - name: Build release AAB + APK (tag or manual)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: cd android && ./gradlew bundleRelease assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: keystore.jks
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          APP_VERSION: ${{ env.APP_VERSION }}
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}

      - name: Sign APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks android/keystore.jks \
            --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} \
            --out android/app/build/outputs/apk/release/app-release-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload signed APK artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: vault-kin/app/android/app/build/outputs/apk/release/app-release-signed.apk

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: vault-kin/app/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload debug APK artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && github.event_name != 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: vault-kin/app/android/app/build/outputs/apk/debug/app-debug.apk

  publish-github-release:
    name: Publish GitHub Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/app-release-signed.apk
            release/app-release.aab
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

  publish-play-store:
    name: Publish to Google Play
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: vault-kin/app/whatsnew

      - uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: release/

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GP_SERVICE_ACCOUNT }}
          packageName: com.intergist.vaultkin
          releaseFiles: release/app-release.aab
          track: ${{ inputs.release_track || 'production' }}
          whatsNewDirectory: vault-kin/app/whatsnew/
