name: scifionly
description: "SciFiOnly — a participatory movie-riffing companion app for sci-fi fans."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  file_picker: ^8.0.0
  share_plus: ^9.0.0
  archive: ^3.6.0
  uuid: ^4.4.0
  flutter_tts: ^4.0.0
  google_fonts: ^6.2.0
  path: ^1.9.0
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
